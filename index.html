<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💊 مُذكِّر الأدوية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>💊 مُذكِّر الأدوية</h1>
            <p class="subtitle">لا تنسَ دوائك مرة أخرى</p>
            <button id="enableNotif" class="btn-notif">🔔 تفعيل الإشعارات</button>
        </header>

        <section class="add-section">
            <h2>➕ إضافة دواء جديد</h2>
            <form id="medForm">
                <div class="form-group">
                    <label for="medName">اسم الدواء</label>
                    <input type="text" id="medName" placeholder="مثال: بانادول" required>
                </div>

                <div class="form-group">
                    <label for="medDose">الجرعة</label>
                    <input type="text" id="medDose" placeholder="مثال: حبة واحدة" required>
                </div>

                <div class="form-group">
                    <label for="medTime">وقت التذكير</label>
                    <input type="time" id="medTime" required>
                </div>

                <div class="form-group">
                    <label for="medNotes">ملاحظات (اختياري)</label>
                    <input type="text" id="medNotes" placeholder="مثال: بعد الأكل">
                </div>

                <button type="submit" class="btn-primary">✅ إضافة الدواء</button>
            </form>
        </section>

        <section class="list-section">
            <h2>📋 أ��ويتي اليومية</h2>
            <div id="medsList" class="meds-list">
                <p class="empty-msg">لا توجد أدوية مضافة بعد. أضف أول دواء من الأعلى 👆</p>
            </div>
        </section>

        <footer>
            <p>صُنع بـ ❤️ لمساعدة الناس | © 2026</p>
        </footer>
    </div>

    <div id="alertModal" class="modal hidden">
        <div class="modal-content">
            <div class="alert-icon">💊</div>
            <h2>حان موعد دوائك!</h2>
            <p id="alertMedName"></p>
            <p id="alertMedDose"></p>
            <button id="takenBtn" class="btn-primary">✅ تناولت الدواء</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
